server {
  listen 80;
  server_name _;

  # Basic health endpoint
  location = /api/health {
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }

  # --- IDV ---
  # /api/idv/*  -->  http://idv:3001/idv/*
  location /api/idv/ {
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Strip /api prefix
    rewrite ^/api(/.*)$ $1 break;

    proxy_pass http://idv:3001;
  }

  # --- Payments ---
  # /api/payments/*  -->  http://payments:3002/payments/*
  location /api/payments/ {
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    rewrite ^/api(/.*)$ $1 break;

    proxy_pass http://payments:3002;
  }

  # --- Cases ---
  # /api/cases/*  -->  http://cases:3003/cases/*
  location /api/cases/ {
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    rewrite ^/api(/.*)$ $1 break;

    proxy_pass http://cases:3003;
  }

  # If someone hits /api without a known route
  location /api {
    return 404 "Unknown API route\n";
    add_header Content-Type text/plain;
  }
}
