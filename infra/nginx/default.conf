server {
  listen 80;
  server_name _;

  # Basic health endpoint
  location = /api/health {
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }

  # ═══════════════════════════════════════════════════════════════
  # Direct routes (used by APIM → VM)
  # APIM sends:  /idv/verify, /payments/direct-debit, /cases/disputes
  # ═══════════════════════════════════════════════════════════════

  # --- IDV ---
  location /idv/ {
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://idv:3001;
  }

  # --- Payments ---
  location /payments/ {
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://payments:3002;
  }

  # --- Cases ---
  location /cases/ {
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://cases:3003;
  }

  # ═══════════════════════════════════════════════════════════════
  # /api prefixed routes (used for local development / direct calls)
  # ═══════════════════════════════════════════════════════════════

  location /api/idv/ {
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    rewrite ^/api(/.*)$ $1 break;
    proxy_pass http://idv:3001;
  }

  location /api/payments/ {
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    rewrite ^/api(/.*)$ $1 break;
    proxy_pass http://payments:3002;
  }

  location /api/cases/ {
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    rewrite ^/api(/.*)$ $1 break;
    proxy_pass http://cases:3003;
  }

  location /api {
    return 404 "Unknown API route\n";
    add_header Content-Type text/plain;
  }

  location /policy-advisor/ {
    proxy_pass http://policy-advisor-adapter:3004/;
}
}
